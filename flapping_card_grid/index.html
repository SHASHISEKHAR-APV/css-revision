<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Card Game UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎮 Card Flip UI</h1>

<div class="grid">

  <!-- Card 1 -->
  <div class="card">
    <input type="checkbox" id="card1">
    <label for="card1" class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back">🔥</div>
    </label>
  </div>

  <!-- Card 2 -->
  <div class="card">
    <input type="checkbox" id="card2">
    <label for="card2" class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back">🎯</div>
    </label>
  </div>

  <!-- Card 3 -->
  <div class="card">
    <input type="checkbox" id="card3">
    <label for="card3" class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back">🚀</div>
    </label>
  </div>

  <!-- Card 4 -->
  <div class="card">
    <input type="checkbox" id="card4">
    <label for="card4" class="card-inner">
      <div class="card-front">?</div>
      <div class="card-back">💎</div>
    </label>
  </div>

</div>

</body>
</html>
